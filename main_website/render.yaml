# render.yaml  — place at repo root
services:
  - type: web
    name: intelliprep
    runtime: python
    rootDir: main_website
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_SECRET_KEY
        sync: false
