```html
{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/question.css">

<div class="test-container" data-session-id="{{ session_id }}">
  <div class="test-header">
    <h2><i class="fas fa-bullseye"></i> Adaptive Assessment Test</h2>
    <div class="session-info">
      <div class="info-item">
        <span class="info-label">Session:</span>
        <span class="info-value">{{ session_id }}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Time Elapsed:</span>
        <span class="info-value" id="timer">00:00</span>
      </div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width: 0%"></div>
  </div>

  <div id="question-area">
    <div class="loading">Loading your first question...</div>
  </div>
</div>

<script src="/static/js/question.js"></script>
{% endblock %}
```
