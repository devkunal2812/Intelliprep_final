{% extends "auth_base.html" %}
{% block title %}Register — IntelliPrep{% endblock %}

{% block content %}
<div class="auth-card" id="register-card">
    <h2 class="card-title">Create Account</h2>
    <p class="card-sub">Start your adaptive learning journey</p>

    {% if error %}
    <div class="alert alert-error" id="alert-error" role="alert">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register" id="register-form" autocomplete="on">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
            <label for="password">Password <span class="hint">(min. 6 characters)</span></label>
            <div class="input-with-toggle">
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    autocomplete="new-password" minlength="6" />
                <button type="button" class="toggle-pw" id="toggle-pw-btn" aria-label="Toggle visibility">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required
                autocomplete="new-password" minlength="6" />
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-register">Create Account</button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="/auth/login" id="link-to-login">Sign in</a>
    </p>
</div>
{% endblock %}
