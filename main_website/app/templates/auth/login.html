{% extends "auth_base.html" %}
{% block title %}Login — IntelliPrep{% endblock %}

{% block content %}
<div class="auth-card" id="login-card">
    <h2 class="card-title">Sign In</h2>
    <p class="card-sub">Enter your credentials to continue</p>

    {% if error %}
    <div class="alert alert-error" id="alert-error" role="alert">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success" id="alert-success" role="alert">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/auth/login" id="login-form" autocomplete="on">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-with-toggle">
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    autocomplete="current-password" />
                <button type="button" class="toggle-pw" id="toggle-pw-btn" aria-label="Toggle password visibility">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-login">Sign In</button>
    </form>

    <p class="auth-switch">
        Don't have an account?
        <a href="/auth/register" id="link-to-register">Create one</a>
    </p>
</div>
{% endblock %}
