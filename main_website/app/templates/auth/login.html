{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/css/auth.css">

<div class="auth-container">
  <div class="auth-header">
    <h2><i class="fas fa-lock"></i> Login</h2>
    <p>Welcome back to IntelliPrep</p>
  </div>

  {% if error %}
  <div class="error-message">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/login" id="loginForm">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" placeholder="Enter your username" required
        autocomplete="username" id="username">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" placeholder="Enter your password" required
        autocomplete="current-password" id="password">
    </div>

    <button type="submit" class="submit-button btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
  </form>

  <div class="demo-info">
    <strong><i class="fas fa-star"></i> Demo Account Available:</strong>
    Username: <code>Kunal12</code><br>
    Password: <code>Kunal@1212</code>
    <br>
    <button class="demo-button" type="button"
      onclick="document.getElementById('username').value='Kunal12'; document.getElementById('password').value='Kunal@1212'; document.getElementById('loginForm').submit();">
      Auto-Fill & Login
    </button>
  </div>

  <div class="auth-link">
    <p>Don't have an account yet?</p>
    <a href="/auth/register">Create a Free Account →</a>
  </div>

  <div class="security-note">
    <i class="fas fa-shield-alt"></i> Your credentials are securely encrypted
  </div>
</div>
{% endblock %}
